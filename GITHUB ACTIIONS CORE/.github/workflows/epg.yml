name: EPG Multi-System Processor

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:  # Manual trigger

jobs:
  process-epg:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Make scripts executable
        run: |
          chmod +x "GITHUB ACTIIONS CORE/C0MBINE PROCESSOR/process_and_push_everything.sh"
          chmod +x "GITHUB ACTIIONS CORE/C0MBINE PROCESSOR/process_and_push_tv3.sh"
          chmod +x "GITHUB ACTIIONS CORE/C0MBINE PROCESSOR/process_and_push_tv4.sh"
          chmod +x "GITHUB ACTIIONS CORE/C0MBINE PROCESSOR/process_and_push_tv5.sh"
      
      - name: Process and push everything
        run: |
          cd "GITHUB ACTIIONS CORE/C0MBINE PROCESSOR"
          ./process_and_push_everything.sh
      
      - name: Process and push TV3
        run: |
          cd "GITHUB ACTIIONS CORE/C0MBINE PROCESSOR"
          ./process_and_push_tv3.sh
      
      - name: Process and push TV4
        run: |
          cd "GITHUB ACTIIONS CORE/C0MBINE PROCESSOR"
          ./process_and_push_tv4.sh
      
      - name: Process and push TV5
        run: |
          cd "GITHUB ACTIIONS CORE/C0MBINE PROCESSOR"
          ./process_and_push_tv5.sh
