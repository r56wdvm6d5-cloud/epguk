name: EPG Multi-System Processor

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:  # Manual trigger
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Set at workflow level

jobs:
  process-epg:
    runs-on: ubuntu-latest
    env:
      GITHUB_PUSH_DIR: "GITHUB ACTIIONS CORE"  # Set to GITHUB ACTIIONS CORE directory
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Make scripts executable
        run: |
          chmod +x "GITHUB ACTIIONS CORE/C0MBINE PROCESSOR/process_and_push_everything.sh"
          chmod +x "GITHUB ACTIIONS CORE/C0MBINE PROCESSOR/process_and_push_tv3.sh"
          chmod +x "GITHUB ACTIIONS CORE/C0MBINE PROCESSOR/process_and_push_tv4.sh"
          chmod +x "GITHUB ACTIIONS CORE/C0MBINE PROCESSOR/process_and_push_tv5.sh"
          chmod +x "GITHUB ACTIIONS CORE/C0MBINE PROCESSOR/process_and_push_epg_combined_from_github.sh"
      
      - name: Debug - Show Node.js version and environment
        run: |
          echo "=== Node.js Version ==="
          node --version
          echo "=== Environment Variables ==="
          env | grep -E "(NODE|FORCE_JAVASCRIPT)"
      
      - name: Process and push everything
        run: |
          cd "GITHUB ACTIIONS CORE/C0MBINE PROCESSOR"
          echo "=== Running process_and_push_everything.sh from ==="
          pwd
          ls -la
          ./process_and_push_everything.sh || echo "Script failed with exit code $?"
