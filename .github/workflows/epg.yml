name: EPG Workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Make script executable
      run: chmod +x "GITHUB ACTIONS CORE/C0MBINE PROCESSOR/process_all_epg_sources.sh"

    - name: Run EPG Source Processor
      run: set -e && "./GITHUB ACTIONS CORE/C0MBINE PROCESSOR/process_all_epg_sources.sh"