name: EPG Multi-System Processor

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:  # Manual trigger

jobs:
  process-epg:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Make scripts executable
        run: |
          chmod +x "GITHUB ACTIIONS CORE/C0MBINE PROCESSOR/process_and_push_everything.sh"
          chmod +x "GITHUB ACTIIONS CORE/C0MBINE PROCESSOR/process_and_push_tv3.sh"
          chmod +x "GITHUB ACTIIONS CORE/C0MBINE PROCESSOR/process_and_push_tv4.sh"
          chmod +x "GITHUB ACTIIONS CORE/C0MBINE PROCESSOR/process_and_push_tv5.sh"
      
      - name: Debug - List files
        run: |
          echo "=== Listing GITHUB ACTIIONS CORE directory ==="
          ls -la "GITHUB ACTIIONS CORE/"
          echo "=== Listing C0MBINE PROCESSOR directory ==="
          ls -la "GITHUB ACTIIONS CORE/C0MBINE PROCESSOR/"
      
      - name: Process and push everything
        run: |
          cd "GITHUB ACTIIONS CORE/C0MBINE PROCESSOR"
          echo "=== Running process_and_push_everything.sh ==="
          ./process_and_push_everything.sh || echo "Script failed with exit code $?"
      
      - name: Process and push TV3
        run: |
          cd "GITHUB ACTIIONS CORE/C0MBINE PROCESSOR"
          echo "=== Running process_and_push_tv3.sh ==="
          ./process_and_push_tv3.sh || echo "Script failed with exit code $?"
      
      - name: Process and push TV4
        run: |
          cd "GITHUB ACTIIONS CORE/C0MBINE PROCESSOR"
          echo "=== Running process_and_push_tv4.sh ==="
          ./process_and_push_tv4.sh || echo "Script failed with exit code $?"
      
      - name: Process and push TV5
        run: |
          cd "GITHUB ACTIIONS CORE/C0MBINE PROCESSOR"
          echo "=== Running process_and_push_tv5.sh ==="
          ./process_and_push_tv5.sh || echo "Script failed with exit code $?"
